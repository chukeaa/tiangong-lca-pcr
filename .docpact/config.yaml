version: 1
layout: repo
lastReviewedAt: "2026-06-23"
lastReviewedCommit: "f2383cbcc512f42291b6d8e2d575a378fd00fc78"

catalog:
  repos:
    - id: pcr
      path: .
      canonicalRepo: chukeaa/tiangong-lca-pcr
      entryDoc: AGENTS.md
      workflowDocs:
        - README.md
        - docs/architecture.md
        - docs/authoring-guide.md
        - docs/classification-policy.md
        - docs/pcr-library-release-policy.md
      workspaceIntegrationRequired: true

ownership:
  domains:
    - id: repo-governance-and-docs
      paths:
        include:
          - AGENTS.md
          - README.md
          - .docpact/config.yaml
          - .gitignore
          - docs/**
      ownerRepo: pcr
    - id: builder-cli-and-schemas
      paths:
        include:
          - package.json
          - builder/**
      ownerRepo: pcr
    - id: classification-sources-and-mappings
      paths:
        include:
          - classifications/**
      ownerRepo: pcr
    - id: reusable-method-modules
      paths:
        include:
          - library/modules/**
          - library/indexes/**
          - library/catalog.yaml
      ownerRepo: pcr

coverage:
  include:
    - AGENTS.md
    - README.md
    - .docpact/config.yaml
    - .gitignore
    - docs/**
    - package.json
    - builder/**
    - classifications/**
    - library/catalog.yaml
    - library/indexes/**
    - library/modules/**
  exclude:
    - .git/**
    - .docpact/runs/**
    - node_modules/**
    - dist/**
    - coverage/**
    - library/pcrs/**
    - "*.log"

freshness:
  warn_after_commits: 40
  warn_after_days: 60
  critical_after_days: 120

routing:
  intents:
    repo-docs:
      paths:
        - AGENTS.md
        - README.md
        - .docpact/config.yaml
        - .gitignore
        - docs/**
    builder:
      paths:
        - package.json
        - builder/**
    classification:
      paths:
        - classifications/**
        - docs/classification-policy.md
    modules:
      paths:
        - library/modules/**
        - library/indexes/**
        - library/catalog.yaml
        - docs/authoring-guide.md
    proof:
      paths:
        - package.json
        - builder/cli/**
        - builder/scripts/**

docInventory:
  include:
    - AGENTS.md
    - README.md
    - .docpact/config.yaml
    - docs/architecture.md
    - docs/authoring-guide.md
    - docs/classification-policy.md
    - docs/pcr-library-release-policy.md

repo:
  id: pcr
  owner: pcr

rules:
  - id: pcr-bootstrap-contract
    scope: repo
    repo: pcr
    triggers:
      - path: AGENTS.md
        kind: repo-contract
      - path: README.md
        kind: repo-landing
      - path: .docpact/config.yaml
        kind: docpact-config
      - path: .gitignore
        kind: repo-ignore-policy
      - path: docs/**
        kind: repo-doc
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: README.md
        mode: review_or_update
      - path: .docpact/config.yaml
        mode: review_or_update
      - path: docs/architecture.md
        mode: review_or_update
      - path: docs/authoring-guide.md
        mode: review_or_update
    reason: Repository entry docs, architecture, and authoring guidance must stay aligned with PCR identity and builder contracts.
  - id: pcr-builder-contract
    scope: repo
    repo: pcr
    triggers:
      - path: package.json
        kind: package-script
      - path: builder/**
        kind: builder-surface
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: README.md
        mode: review_or_update
      - path: docs/architecture.md
        mode: review_or_update
      - path: docs/authoring-guide.md
        mode: review_or_update
    reason: Builder CLI, templates, and schemas define how PCR records are generated and validated.
  - id: pcr-classification-contract
    scope: repo
    repo: pcr
    triggers:
      - path: classifications/**
        kind: classification-source-or-mapping
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: docs/classification-policy.md
        mode: review_or_update
      - path: .docpact/config.yaml
        mode: review_or_update
    reason: Classification source and mapping changes must preserve the boundary between external classification systems and canonical PCR identity.
  - id: pcr-module-contract
    scope: repo
    repo: pcr
    triggers:
      - path: library/modules/**
        kind: method-module
      - path: library/indexes/**
        kind: pcr-index
      - path: library/catalog.yaml
        kind: pcr-catalog
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: docs/architecture.md
        mode: review_or_update
      - path: docs/authoring-guide.md
        mode: review_or_update
    reason: Reusable method modules and indexes are shared PCR authoring surfaces.
