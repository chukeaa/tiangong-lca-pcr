name: PCR feedback
description: Report evidence, ambiguity, UUID, translation, or modelling guidance issues for an existing PCR.
title: "PCR feedback: <type> for <pcr-id>"
labels:
  - pcr-feedback
body:
  - type: dropdown
    id: feedback_type
    attributes:
      label: Feedback type
      options:
        - classification_mapping_gap
        - unclear_reference_flow
        - wrong_or_missing_uuid
        - process_boundary_issue
        - inventory_flow_gap
        - range_evidence_update
        - unit_or_flow_property_issue
        - validation_rule_issue
        - translation_mismatch
        - source_update
    validations:
      required: true
  - type: input
    id: pcr_id
    attributes:
      label: PCR id
      placeholder: pcr.domain.subdomain.product
    validations:
      required: true
  - type: input
    id: pcr_version
    attributes:
      label: PCR version
      placeholder: "0.1.0"
  - type: input
    id: affected_section
    attributes:
      label: Affected section
      placeholder: Reference Flow, Process Inventory, Data Sources, Translation, Mapping
  - type: input
    id: process_id
    attributes:
      label: Affected process_id
      placeholder: field_seed_multiplication
  - type: input
    id: flow_role
    attributes:
      label: Affected flow role
      placeholder: Previous-generation wheat seed
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the issue or improvement in operational terms.
    validations:
      required: true
  - type: textarea
    id: current_rule
    attributes:
      label: Current PCR text or rule excerpt
  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed change
  - type: textarea
    id: evidence_sources
    attributes:
      label: Evidence sources
      description: Include URLs, documents, dataset references, Tiangong lookup outputs, or reviewer notes when available.
  - type: textarea
    id: model_impact
    attributes:
      label: Impact on LCA model construction
      description: Explain how the issue affects process, lifecyclemodel, flow, unit, range, source, or validation behavior.
  - type: dropdown
    id: confidence
    attributes:
      label: Confidence
      options:
        - high
        - medium
        - low
        - unknown
  - type: input
    id: generated_by
    attributes:
      label: Generated by
      placeholder: human, Codex, Claude Code, tiangong-pcr feedback draft
