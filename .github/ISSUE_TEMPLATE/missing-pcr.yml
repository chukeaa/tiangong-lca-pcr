name: Missing PCR
description: Request a new canonical PCR when no existing PCR fits a target product category.
title: "Missing PCR: <product/category>"
labels:
  - pcr-feedback
  - missing-pcr
body:
  - type: input
    id: product_category
    attributes:
      label: Product or category
      placeholder: Wheat straw for animal bedding
    validations:
      required: true
  - type: textarea
    id: intended_model
    attributes:
      label: Intended LCA model use
      description: Describe the process or lifecyclemodel you were trying to build.
    validations:
      required: true
  - type: textarea
    id: classification_context
    attributes:
      label: Classification context
      description: Include CPC, HS, ISIC, NAICS, or other classification candidates if available.
  - type: textarea
    id: nearest_pcrs
    attributes:
      label: Nearest PCR candidates considered
      description: List PCR ids inspected through tiangong-pcr tree/list/guidance and explain why they do not fit.
  - type: textarea
    id: expected_reference_flow
    attributes:
      label: Expected reference flow
  - type: textarea
    id: expected_processes
    attributes:
      label: Expected process map or process inventory shape
  - type: textarea
    id: evidence_sources
    attributes:
      label: Evidence sources
  - type: input
    id: generated_by
    attributes:
      label: Generated by
      placeholder: human, Codex, Claude Code, tiangong-pcr feedback draft
