schema_version: 1
vocab: amount_kind
values:
  exact:
    description: A single value is specified by the PCR.
  range:
    description: Lower and upper bounds are specified.
  formula:
    description: Value is calculated from a formula or method rule.
  site_specific:
    description: Value must be provided by foreground site data.
  product_specific:
    description: Value depends on the selected product or formulation.
  route_specific:
    description: Value depends on the transport or delivery route.
  not_applicable:
    description: A quantity is not applicable for this row or rule.
